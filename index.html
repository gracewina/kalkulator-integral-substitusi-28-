<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Integral Substitusi - Gracewinna</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .author {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1em;
        }
        .info-box {
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: 600;
            color: #34495e;
        }
        input {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            margin-top: 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #27ae60;
        }
        .hasil-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #dcdde1;
            border-radius: 8px;
        }
        .final-result {
            font-size: 1.3em;
            color: #c0392b;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
        }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/MathJax.js?config=TeX-mml-chtml"></script>
</head>
<body>
    <div class="container">
        <h1>Kalkulator Integral Substitusi</h1>
        <p class="author">Dibuat oleh: <strong>Gracewinna</strong></p>
        
        <div class="info-box">
            <p>Kalkulator ini menyelesaikan bentuk integral substitusi khusus:</p>
            <p class="math-formula">$$\int a \cdot x \cdot (x^2 + b)^n \, dx$$</p>
        </div>

        <div class="input-group">
            <label for="input-a">Nilai koefisien luar ($a$):</label>
            <input type="number" id="input-a" value="2" placeholder="Contoh: 2">
            
            <label for="input-b">Nilai konstanta dalam ($b$):</label>
            <input type="number" id="input-b" value="5" placeholder="Contoh: 5">
            
            <label for="input-n">Pangkat ($n$):</label>
            <input type="number" id="input-n" value="3" placeholder="Contoh: 3">
            
            <button onclick="hitungIntegral()">Hitung Integral</button>
        </div>

        <div id="hasil-box" class="hasil-box" style="display: none;">
            <h3>Langkah Penyelesaian:</h3>
            <div id="langkah-langkah"></div>
            <h3>Hasil Akhir:</h3>
            <div id="hasil-akhir" class="final-result"></div>
        </div>
    </div>

    <script>
        function hitungIntegral() {
            const a = parseFloat(document.getElementById('input-a').value);
            const b = parseFloat(document.getElementById('input-b').value);
            const n = parseFloat(document.getElementById('input-n').value);

            if (isNaN(a) || isNaN(b) || isNaN(n)) {
                alert("Mohon masukkan semua angka dengan benar!");
                return;
            }

            const hasilBox = document.getElementById('hasil-box');
            hasilBox.style.display = 'block';
            
            const koefisienLuar = a / 2;
            const pangkatBaru = n + 1;
            const koefisienAkhir = koefisienLuar / pangkatBaru;

            let langkahHtml = `
                <p>1. Misalkan: $u = x^2 + ${b}$</p>
                <p>2. Turunan: $du = 2x \, dx \implies x \, dx = \frac{du}{2}$</p>
                <p>3. Substitusikan ke dalam integral asli:</p>
                <p>$$\int ${a}x (x^2 + ${b})^{${n}} \, dx = \int ${a} \cdot u^{${n}} \cdot \frac{du}{2}$$</p>
                <p>$$= ${koefisienLuar} \int u^{${n}} \, du$$</p>
                <p>4. Integralkan terhadap $u$:</p>
                <p>$$= ${koefisienLuar} \cdot \frac{1}{${pangkatBaru}} u^{${pangkatBaru}} + C$$</p>
            `;

            let hasilAkhirText = '';
            if (Number.isInteger(koefisienAkhir)) {
                hasilAkhirText = `$$${koefisienAkhir} (x^2 + ${b})^{${pangkatBaru}} + C$$`;
            } else {
                hasilAkhirText = `$$${koefisienAkhir.toFixed(3)} (x^2 + ${b})^{${pangkatBaru}} + C$$`;
            }

            document.getElementById('langkah-langkah').innerHTML = langkahHtml;
            document.getElementById('hasil-akhir').innerHTML = hasilAkhirText;

            MathJax.typeset();
        }
    </script>
</body>
</html>
